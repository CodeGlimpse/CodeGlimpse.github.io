name: Update theme

on:
  schedule:
    - cron: "0 2 * * 1" # Weekly: Monday 02:00 UTC
  workflow_dispatch:

jobs:
  update-theme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "^1.22.0"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 0.123.8
          extended: true

      - name: Update theme
        run: hugo mod get -u github.com/CaiJimmy/hugo-theme-stack/v3

      - name: Tidy go.mod, go.sum
        run: hugo mod tidy

      - name: Build check
        run: hugo --minify --gc

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-hugo-theme
          title: "CI: Update Hugo theme"
          commit-message: "CI: Update Hugo theme"
          body: |
            Automated weekly theme update.
            - Ran `hugo mod get -u github.com/CaiJimmy/hugo-theme-stack/v3`
            - Ran `hugo mod tidy`
            - Build check passed
          labels: dependencies, automated